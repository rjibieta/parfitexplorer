<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Derek Parfit — A Visual Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1714; --fg: #e8e0d4; --dim: #8a7e6e;
  --accent: #b8a88a; --warm: #c0785a;
  --ghost: rgba(184,168,138,0.08);
  --serif: 'Libre Baskerville', Georgia, serif;
  --sans: 'DM Sans', 'Helvetica Neue', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--fg); font-family: var(--sans); }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.fade-in { animation: fadeIn 0.4s ease both; }
.fade-out { opacity:0; transition: opacity 0.3s ease; }
.nav-dot { width:8px; height:8px; border-radius:50%; border:1.5px solid var(--dim); background:transparent; cursor:pointer; transition:all 0.3s; padding:0; }
.nav-dot.active { background:var(--warm); border-color:var(--warm); width:20px; border-radius:4px; }
.nav-dot:hover { border-color:var(--accent); }
.section-label { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--warm); margin-bottom:0.5rem; }
input[type=range] { -webkit-appearance:none; appearance:none; height:6px; border-radius:3px; background:var(--ghost); outline:none; width:60%; max-width:400px; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:18px; height:18px; border-radius:50%; background:var(--warm); cursor:pointer; border:2px solid var(--bg); }
button { font-family: var(--sans); }
.cb { padding:1.2rem 1.5rem; border-radius:8px; cursor:pointer; max-width:200px; text-align:left; border:2px solid var(--ghost); background:transparent; transition:all 0.3s; color:var(--fg); }
.cb.sa { border-color:var(--accent); background:var(--ghost); }
.cb.sw { border-color:var(--warm); background:var(--ghost); }
.ib { padding:1rem 1.5rem; background:var(--ghost); border-radius:8px; font-family:var(--serif); font-style:italic; font-size:0.95rem; line-height:1.6; max-width:480px; margin:0 auto; animation:fadeUp 0.6s ease both; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const EX = [
  { id:"intro", title:"Derek Parfit", subtitle:"A Visual Guide to His Ideas", category:null },
  { id:"teleporter", title:"The Teleporter", subtitle:"Reasons and Persons, §78–84", category:"Personal Identity", question:"If a machine destroys your body and creates an exact replica on Mars — atom by atom — did you survive?", setup:"You step into a Teleporter on Earth. It scans every atom in your body, destroys the original, and transmits a blueprint to Mars, where an identical body is assembled. The person on Mars has all your memories, personality, and believes they are you.", insight:'Parfit argues that what matters in survival is not some deep metaphysical "identity" but psychological continuity — the chain of memories, intentions, and character that connects you across time. The replica on Mars has all of that. So what, exactly, did you lose?', provocation:'You already survive the "destruction" of your cells every ~7 years. Is the Teleporter really so different?', interactive:"teleporter" },
  { id:"branch", title:"The Branch Line Case", subtitle:"Reasons and Persons, §85–86", category:"Personal Identity", question:"What if the Teleporter malfunctions and the original you isn't destroyed?", setup:"Same Teleporter — but this time, the scanner doesn't destroy you. Now there are two of you: the original on Earth (who will die of cardiac failure from the scan in a few days) and the perfect replica on Mars. You can talk to each other by phone.", insight:'If the replica is "you" when the original is destroyed, why isn\'t the replica "you" when the original briefly survives? Parfit uses this to show that identity is not what matters. What matters is the continuation of your psychological life — and that can branch.', provocation:'Both versions share your past. Both feel like "you" from the inside. Which one is the real you? Parfit says: that\'s the wrong question entirely.', interactive:"branch" },
  { id:"division", title:"My Division", subtitle:"Reasons and Persons, §89", category:"Personal Identity", question:"If each half of your brain were transplanted into a different body, which one is you?", setup:"We know each brain hemisphere can support consciousness (as seen in split-brain patients). Imagine both hemispheres of your brain are transplanted into two different bodies. Both resulting people wake up with your memories, your personality, your sense of humor. Both believe they are you.", insight:'Unlike the Teleporter, this is physically plausible. There is no fact of the matter about which one is "really" you. Parfit argues this shows personal identity is not a deep metaphysical truth — it\'s a convenient fiction that breaks down under pressure. What matters is that your psychological life continues, even in two places at once.', provocation:'If both halves carry your full psychological life, then "you" have survived as two people. That sounds like a contradiction — unless identity was never the right concept.', interactive:"division" },
  { id:"spectrum", title:"The Combined Spectrum", subtitle:"Reasons and Persons, §87–89", category:"Personal Identity", question:"If we gradually replaced every cell and memory in your body with Napoleon's, at what point did you stop being you?", setup:"Imagine a spectrum of cases. At one end, you are unchanged. At the other end, you have Napoleon's body, brain, memories, and personality. In between are thousands of tiny intermediate cases — each one barely different from the last.", insight:'There is no sharp boundary. Each step is so small you can\'t point to the moment identity "switches." Parfit concludes personal identity is indeterminate — it comes in degrees, like the transition from day to night.', provocation:"If there's no fact of the matter about whether you survived, then personal identity can't be what matters most about survival.", interactive:"spectrum" },
  { id:"nobleman", title:"The Russian Nobleman", subtitle:"Reasons and Persons, §62", category:"Personal Identity", question:"When your future self betrays your current values, which version of you deserves authority over your life?", setup:"A young Russian nobleman, full of socialist ideals, is about to inherit a vast estate. He knows that as he ages, he'll become conservative and refuse to give the land to the peasants. So he signs a legal document now, irrevocably committing his future self to distribute the estate — regardless of what that future self wants.", insight:'Parfit uses this to explore whether we should treat our future selves as different people. If the future nobleman has genuinely different values and character — how much authority should his younger self have over him? And conversely: if your present self makes commitments, are you bound by them when you\'ve become someone who no longer endorses them?', provocation:"You've almost certainly made promises based on values you no longer hold. Were you wrong to make them, or wrong to abandon them? If identity comes in degrees, this question has no clean answer.", interactive:"nobleman" },
  { id:"surgery", title:"Past Surgery", subtitle:"Reasons and Persons, §64", category:"Rationality & Time", question:"Is it rational to prefer ten hours of past agony over one hour of future pain?", setup:'You wake up in a hospital with no memory of the last 24 hours. A nurse tells you one of two things: either you already endured a grueling 10-hour surgery yesterday (it\'s over, you just can\'t remember it), or you\'re about to have a mildly painful 1-hour surgery today.', insight:"Almost everyone hopes it was the 10-hour surgery yesterday — even though that's ten times more total suffering. We instinctively discount past pain and dread future pain. Parfit asks: is this rational? The suffering happened either way. Our bias toward the future is powerful — but it may be just a bias, not a reason.", provocation:'We structure entire lives around future-bias: saving the best for last, dreading Mondays, feeling relieved when bad experiences are "over." But if all moments of experience are equally real, this is an illusion — a trick of temporal perspective.', interactive:"surgery" },
  { id:"tuesday", title:"Future Tuesday Indifference", subtitle:"Reasons and Persons, §8", category:"Rationality & Time", question:"Is it rational to not care about pain — but only on Tuesdays?", setup:"Imagine someone who is perfectly rational in every respect, except: they genuinely don't care about suffering on Tuesdays. They'd choose agonizing pain next Tuesday over a mild headache on Wednesday. They're not confused — they just don't weight Tuesday pain in their decisions.", insight:'This sounds insane. But Parfit uses it to probe: what makes some preferences rational and others not? If all preferences are equally valid, you can\'t explain what\'s wrong with Tuesday Indifference. Parfit argues that reasons are objective: there are facts about what we should care about, independent of what we happen to desire.', provocation:"We all have our own versions of Tuesday Indifference — things we irrationally discount. Maybe it's our health, our relationships, the distant future. The question isn't whether we have blind spots. It's whether we can justify them.", interactive:"tuesday" },
  { id:"egyptologist", title:"The Egyptologist", subtitle:"Reasons and Persons, §7", category:"Rationality & Time", question:"Should you act on beliefs you know will soon be proven wrong?", setup:"An Egyptologist believes, based on strong evidence, that a certain pharaoh died in 3000 BC. She's about to present her findings. But she also knows that tomorrow, new carbon-dating results will arrive that will almost certainly overturn her belief — she just doesn't know in which direction.", insight:"Parfit argues this reveals something important: rationality isn't just about acting on current beliefs, but about accounting for the trajectory of your evidence. If you know your beliefs are about to change, that knowledge is itself evidence. The rational response to expected future evidence is to act with appropriate uncertainty now.", provocation:"We face this constantly: making decisions when we know more information is coming. Medical tests pending, elections approaching, data not yet in. Acting with false confidence when you know better evidence is around the corner is a form of willful irrationality.", interactive:"egyptologist" },
  { id:"twominute", title:"The Two-Minute Case", subtitle:"Reasons and Persons, §62", category:"Rationality & Time", question:"If self-interest is the ultimate rational principle, does it make sense to sacrifice your whole life for its last two minutes?", setup:"Imagine a theory of rationality that says: always act in your own self-interest. Now imagine a deal: a life of moderate happiness for 80 years, or a life of suffering for nearly 80 years — followed by 2 minutes of ecstasy so intense it outweighs everything that came before.", insight:"If self-interest means maximizing total lifetime welfare, and those 2 minutes are intense enough, rationality demands the suffering. But this is absurd. Parfit uses this to argue that pure self-interest theory — the idea that rationality just means pursuing your own good — leads to conclusions no one would accept. Something is wrong with the framework.", provocation:"We live in a culture that treats self-interest as the baseline of rationality. Parfit thinks this is not just wrong, but dangerously wrong. Self-interest isn't the bedrock — it's a theory, and like any theory, it can fail.", interactive:"twominute" },
  { id:"torturers", title:"The Harmless Torturers", subtitle:"Reasons and Persons, §17", category:"Collective Ethics", question:"If a thousand people each cause an imperceptible amount of pain, and the result is agony — who is responsible?", setup:'A thousand torturers stand before a victim. Each turns a dial that increases electric current by an amount below the threshold of perception. No single torturer causes any noticeable increase in pain. But collectively, they cause excruciating agony. Each can truthfully say: "My action made no perceptible difference."', insight:"This destroys the idea that morality is only about individual acts with perceptible effects. Each action is harmless on its own. But the collective result is torture. Parfit argues we must be responsible for contributions to collective harms, even when our individual contribution is imperceptible.", provocation:"Climate change is the Harmless Torturers at global scale. Your individual carbon footprint is imperceptible. So is mine. But collectively, we are cooking the planet. If no one's individual contribution \"matters,\" then no one is responsible — and nothing changes.", interactive:"torturers" },
  { id:"drops", title:"Drops of Water", subtitle:"Reasons and Persons, §30", category:"Collective Ethics", question:"Should you add your drop of water to a pool that will save thousands from dying of thirst?", setup:"A thousand people are dying of thirst. You and a million others each have a pint of water. If enough pour into a shared pool, it saves everyone. But your single pint, divided among a thousand, gives each person a thousandth of a pint — an amount that makes no perceptible difference to anyone.", insight:'If morality only requires you to help when your help makes a perceptible difference, you should keep your water. But if everyone reasons this way, no one contributes, and a thousand people die. Parfit argues this exposes a fatal flaw in "person-affecting" moral reasoning.', provocation:"Voting, charitable giving, recycling, vaccination — we face Drops of Water problems constantly. Your individual vote doesn't decide elections. Your individual donation doesn't end poverty. But if everyone reasons this way, democracy collapses and poverty continues.", interactive:"drops" },
  { id:"prisoner", title:"The Prisoner's Dilemma", subtitle:"Reasons and Persons, §36–62", category:"Collective Ethics", question:"When does rational self-interest destroy the thing it's trying to protect?", setup:"Two prisoners are held separately. Each can cooperate (stay silent) or defect (testify against the other). If both cooperate: 1 year each. Both defect: 5 years each. One defects while the other cooperates: defector goes free, cooperator gets 10 years. Self-interest says: always defect. But if both follow this logic, both get 5 years.", insight:"Parfit was deeply interested in how individual rationality can produce collective irrationality. The Prisoner's Dilemma models every situation where individual incentives conflict with group welfare: arms races, overfishing, pollution. If \"rational\" means \"self-interested,\" then rationality is self-defeating.", provocation:"Every tragedy of the commons — antibiotic overuse, social media's race to the bottom, tax avoidance — is a Prisoner's Dilemma. The \"rational\" choice for each individual is precisely what makes everyone worse off.", interactive:"prisoner" },
  { id:"repugnant", title:"The Repugnant Conclusion", subtitle:"Reasons and Persons, §143", category:"Population Ethics", question:"Is a world of 10 billion ecstatic people better or worse than a world of 100 trillion people whose lives are barely worth living?", setup:'Population A has a small number of people with extremely high quality of life. Population Z has astronomically more people, each with a life just barely worth living. The sheer number in Z means its total wellbeing is higher.', insight:'Most ethical theories that add up wellbeing must conclude Z is better than A. Parfit found this deeply troubling — hence "repugnant." It reveals a fundamental tension in how we think about what makes the world go well.', provocation:'If you reject the Repugnant Conclusion, you may be committed to the "elitist" view that a few very happy lives matter more than billions of okay lives. Neither option is comfortable.', interactive:"repugnant" },
  { id:"nonidentity", title:"The Non-Identity Problem", subtitle:"Reasons and Persons, §122–131", category:"Ethics of Future People", question:"Can a policy harm future people if those people would not exist without that policy?", setup:"A 14-year-old decides to have a child now rather than waiting. The child has a harder start in life. But if she had waited, she would have had a different child. The child who exists can't say \"I wish you'd waited\" — because then they wouldn't exist.", insight:'This generalizes to climate change, nuclear waste, resource depletion. The people affected by our bad choices are different people than would exist if we chose well. Parfit shows that person-affecting ethics — the idea that an act is wrong only if it\'s bad for someone — collapses here.', provocation:"If we can't say we've harmed anyone in particular, does that mean reckless environmental destruction is morally fine? Parfit says no — but explaining why requires rebuilding ethical theory from scratch.", interactive:"nonidentity" },
  { id:"mountain", title:"Climbing the Mountain", subtitle:"On What Matters, Vol. I–III", category:"Moral Convergence", question:"What if Kant, the utilitarians, and the contractualists were all climbing the same mountain from different sides?", interactive:"mountain" },
  { id:"conclusion", title:"What It All Means", subtitle:"The threads, tied together", category:"Conclusion" },
];

function TeleporterViz(){const[p,sP]=useState(0),[q,sQ]=useState(!1),run=()=>{if(p>0){sP(0);sQ(!1);return}sP(1);sQ(!1);setTimeout(()=>sP(2),1800);setTimeout(()=>{sP(3);sQ(!0)},3200)};return(<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:"3rem",flexWrap:"wrap",minHeight:180}}><div style={{textAlign:"center"}}><div style={{fontSize:"0.7rem",letterSpacing:"0.15em",textTransform:"uppercase",color:"var(--dim)",marginBottom:8}}>Earth</div><div style={{width:90,height:90,borderRadius:"50%",background:p>=2?"var(--ghost)":"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,transition:"all 1s",opacity:p>=2?.25:1,border:p===1?"3px solid var(--warm)":"3px solid transparent",boxShadow:p===1?"0 0 30px var(--warm)":"none",margin:"0 auto"}}>🧍</div><div style={{fontSize:".75rem",color:"var(--dim)",marginTop:6,fontStyle:"italic"}}>{p===0&&"You, intact"}{p===1&&"Scanning..."}{p>=2&&"Destroyed"}</div></div><div style={{fontSize:28,color:p>=1?"var(--warm)":"var(--ghost)",transition:"color .6s",letterSpacing:4}}>{p>=1?"⚡→⚡":"· · ·"}</div><div style={{textAlign:"center"}}><div style={{fontSize:"0.7rem",letterSpacing:"0.15em",textTransform:"uppercase",color:"var(--dim)",marginBottom:8}}>Mars</div><div style={{width:90,height:90,borderRadius:"50%",background:p>=2?"var(--accent)":"var(--ghost)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,transition:"all 1s",opacity:p>=2?1:.25,border:p>=2?"3px solid var(--warm)":"3px solid transparent",margin:"0 auto"}}>🧍</div><div style={{fontSize:".75rem",color:"var(--dim)",marginTop:6,fontStyle:"italic"}}>{p<2&&"Nothing yet"}{p>=2&&"Exact replica"}</div></div></div>{q&&<div className="ib" style={{marginTop:"1.5rem"}}>The replica has your memories, your loves, your fears, your half-finished novel.<br/><strong style={{fontStyle:"normal"}}>Is it you?</strong></div>}<button onClick={run} style={{marginTop:"1.5rem",padding:".6rem 1.8rem",background:"none",border:"2px solid var(--accent)",color:"var(--fg)",cursor:"pointer",borderRadius:4,fontFamily:"var(--serif)",fontSize:".9rem"}}>{p===0?"Step Into the Teleporter":"Reset"}</button></div>)}

function BranchViz(){const[a,sA]=useState(!1);return(<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{position:"relative",minHeight:220}}><div style={{position:"absolute",left:"50%",top:0,transform:"translateX(-50%)",transition:"all 1s",...(a?{left:"22%",top:10}:{})}}><div style={{width:80,height:80,borderRadius:"50%",background:a?"var(--warm)":"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,transition:"all 1s",opacity:a?.6:1,margin:"0 auto"}}>🧍</div><div style={{fontSize:".7rem",color:"var(--dim)",marginTop:6,letterSpacing:".1em",textTransform:"uppercase"}}>{a?"Original (dying)":"You"}</div></div>{a&&<div style={{position:"absolute",right:"22%",top:10,animation:"fadeUp 1s ease both"}}><div style={{width:80,height:80,borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto"}}>🧍</div><div style={{fontSize:".7rem",color:"var(--dim)",marginTop:6,letterSpacing:".1em",textTransform:"uppercase"}}>Replica (healthy)</div></div>}{a&&<div style={{position:"absolute",top:100,left:"50%",transform:"translateX(-50%)",width:140,borderTop:"2px dashed var(--dim)",opacity:.5}}/>}{a&&<div style={{position:"absolute",top:120,left:"50%",transform:"translateX(-50%)",fontSize:".75rem",color:"var(--dim)",fontStyle:"italic",animation:"fadeUp 1.5s ease both"}}>📞 You can talk to each other</div>}{a&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:"80%",maxWidth:400,padding:".8rem 1.2rem",background:"var(--ghost)",borderRadius:8,fontFamily:"var(--serif)",fontStyle:"italic",fontSize:".95rem",lineHeight:1.5,animation:"fadeUp 2s ease both"}}>Both share your past. Both feel like "you" from the inside.<br/><strong style={{fontStyle:"normal"}}>Which one is the real you?</strong><br/><span style={{fontSize:".85rem"}}>Parfit: That's the wrong question entirely.</span></div>}</div><button onClick={()=>sA(!a)} style={{marginTop:"1rem",padding:".6rem 1.8rem",background:"none",border:"2px solid var(--accent)",color:"var(--fg)",cursor:"pointer",borderRadius:4,fontFamily:"var(--serif)",fontSize:".9rem"}}>{a?"Reset":"Malfunction!"}</button></div>)}

function DivisionViz(){const[s,sS]=useState(!1);return(<div style={{textAlign:"center",padding:"2rem 0"}}>{!s&&<div><div style={{width:90,height:90,borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,margin:"0 auto"}}>🧠</div><div style={{fontSize:".7rem",color:"var(--dim)",marginTop:8,letterSpacing:".1em",textTransform:"uppercase"}}>Your complete brain</div></div>}{s&&<div style={{animation:"fadeUp .8s ease both"}}><div style={{display:"flex",justifyContent:"center",gap:"4rem"}}>{["Left","Right"].map(h=><div key={h} style={{textAlign:"center"}}><div style={{width:80,height:80,borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto",border:"3px solid var(--warm)"}}>🧍</div><div style={{fontSize:".7rem",color:"var(--dim)",marginTop:8,letterSpacing:".1em",textTransform:"uppercase"}}>{h} hemisphere</div><div style={{fontSize:".75rem",fontFamily:"var(--serif)",fontStyle:"italic",marginTop:4}}>Has your memories.<br/>Believes they are you.</div></div>)}</div><div className="ib" style={{marginTop:"2rem"}}>Both are psychologically continuous with you. Neither is more "you" than the other. <strong style={{fontStyle:"normal"}}>There is no fact of the matter.</strong></div></div>}<button onClick={()=>sS(!s)} style={{marginTop:"1.5rem",padding:".6rem 1.8rem",background:"none",border:"2px solid var(--accent)",color:"var(--fg)",cursor:"pointer",borderRadius:4,fontFamily:"var(--serif)",fontSize:".9rem"}}>{s?"Reset":"Split the Brain"}</button></div>)}

function SpectrumViz(){const[v,sV]=useState(0),p=v/100,tx=[[0,10,"Fully you. Unambiguous."],[10,30,"A few cells replaced, a faint memory altered. Still you... right?"],[30,50,"Your childhood memories are fading. New ones taking shape. Whose hands are these?"],[50,70,'Half you, half Napoleon. "Am I still me?" has no clear answer.'],[70,90,"You remember Austerlitz. Your native language is shifting to French."],[90,101,"Fully Napoleon. But where did you stop being you?"]];return(<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",maxWidth:400,margin:"0 auto",gap:"1rem"}}><div style={{textAlign:"center",opacity:1-p*.7}}><div style={{fontSize:40,marginBottom:4}}>🧍</div><div style={{fontSize:".7rem",letterSpacing:".1em",textTransform:"uppercase",color:"var(--dim)"}}>You</div></div><div style={{flex:1,height:8,borderRadius:4,position:"relative",background:"linear-gradient(to right,var(--accent),var(--warm),#8B4513)",margin:"20px 0"}}><div style={{position:"absolute",top:-6,left:v+"%",transform:"translateX(-50%)",width:20,height:20,borderRadius:"50%",background:"var(--fg)",border:"3px solid var(--bg)",transition:"left .1s"}}/></div><div style={{textAlign:"center",opacity:.3+p*.7}}><div style={{fontSize:40,marginBottom:4}}>👤</div><div style={{fontSize:".7rem",letterSpacing:".1em",textTransform:"uppercase",color:"var(--dim)"}}>Napoleon</div></div></div><input type="range" min={0} max={100} value={v} onChange={e=>sV(+e.target.value)} style={{marginTop:"1rem"}}/><div style={{marginTop:"1rem",fontFamily:"var(--serif)",fontStyle:"italic",fontSize:".95rem",lineHeight:1.5,minHeight:50}}>{(tx.find(t=>v>=t[0]&&v<t[1])||[])[2]}</div><div style={{marginTop:".8rem",fontSize:".8rem",color:"var(--dim)",fontFamily:"var(--serif)"}}>No sharp boundary. Identity is not all-or-nothing.</div></div>)}

function NoblemanViz(){const[c,sC]=useState(null);return(<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{display:"flex",justifyContent:"center",gap:"2rem",flexWrap:"wrap",marginBottom:"1.5rem"}}><div style={{textAlign:"center",padding:"1.5rem",borderRadius:8,cursor:"pointer",border:c==="y"?"2px solid var(--accent)":"2px solid var(--ghost)",background:c==="y"?"var(--ghost)":"transparent",transition:"all .3s",maxWidth:180}} onClick={()=>sC("y")}><div style={{fontSize:36,marginBottom:8}}>🧑</div><div style={{fontSize:".7rem",letterSpacing:".1em",textTransform:"uppercase",color:"var(--dim)",marginBottom:4}}>Young Nobleman</div><div style={{fontSize:".8rem",fontFamily:"var(--serif)",lineHeight:1.5}}>Idealistic. Wants to give it all away.</div></div><div style={{display:"flex",alignItems:"center",fontSize:24,color:"var(--dim)"}}>→</div><div style={{textAlign:"center",padding:"1.5rem",borderRadius:8,cursor:"pointer",border:c==="o"?"2px solid var(--warm)":"2px solid var(--ghost)",background:c==="o"?"var(--ghost)":"transparent",transition:"all .3s",maxWidth:180}} onClick={()=>sC("o")}><div style={{fontSize:36,marginBottom:8}}>👴</div><div style={{fontSize:".7rem",letterSpacing:".1em",textTransform:"uppercase",color:"var(--dim)",marginBottom:4}}>Old Nobleman</div><div style={{fontSize:".8rem",fontFamily:"var(--serif)",lineHeight:1.5}}>Conservative. Wants to keep everything.</div></div></div><div style={{fontSize:".8rem",color:"var(--dim)",marginBottom:"1rem"}}>Whose wishes should govern?</div>{c&&<div className="ib">{c==="y"?<>You've sided with the idealist — but that means overriding a competent adult's wishes. Is locking someone into their younger self's values <em>coercion</em>?</>:<>You've sided with autonomy — but the older self only has the estate because his younger self earned it. Isn't honoring the original commitment more faithful?</>}<br/><br/><strong style={{fontStyle:"normal"}}>If your future self is a different person — neither answer is clean.</strong></div>}</div>)}

function SurgeryViz(){const[c,sC]=useState(null);return(<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{fontFamily:"var(--serif)",fontSize:".9rem",marginBottom:"1.5rem",color:"var(--dim)"}}>You wake up with no memory. The nurse says:</div><div style={{display:"flex",justifyContent:"center",gap:"2rem",flexWrap:"wrap",marginBottom:"1.5rem"}}><div className={"cb"+(c==="p"?" sa":"")} onClick={()=>sC("p")}><div style={{fontWeight:700,marginBottom:6,fontSize:".9rem"}}>😮‍💨 Already happened</div><div style={{fontSize:".8rem",color:"var(--dim)",lineHeight:1.5}}><strong>10 hours</strong> of agony yesterday. It's over.</div></div><div className={"cb"+(c==="f"?" sw":"")} onClick={()=>sC("f")}><div style={{fontWeight:700,marginBottom:6,fontSize:".9rem"}}>😰 Still to come</div><div style={{fontSize:".8rem",color:"var(--dim)",lineHeight:1.5}}><strong>1 hour</strong> of mild pain today.</div></div></div>{c&&<div className="ib">{c==="p"?<>You chose 10× more suffering — just because it's past. <strong style={{fontStyle:"normal"}}>Almost everyone does.</strong> If all moments of experience are equally real, the 1-hour surgery is objectively better. Our future-bias is powerful, instinctive — and possibly irrational.</>:<>Most people don't pick this. The pull of "it's already over" is almost irresistible. If all moments are equally real, you may be the more rational one.</>}</div>}</div>)}

function TuesdayViz(){const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],[s,sS]=useState(null);return(<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{fontFamily:"var(--serif)",fontSize:".9rem",marginBottom:"1.5rem",color:"var(--dim)"}}>Pick a day you'd be willing to ignore pain on:</div><div style={{display:"flex",justifyContent:"center",gap:6,flexWrap:"wrap",marginBottom:"1.5rem"}}>{days.map(d=><button key={d} onClick={()=>sS(d)} style={{padding:".6rem 1rem",borderRadius:6,border:s===d?"2px solid var(--warm)":"2px solid var(--ghost)",background:s===d?"var(--ghost)":"transparent",color:s===d?"var(--warm)":"var(--fg)",cursor:"pointer",fontSize:".85rem",fontWeight:s===d?700:400,transition:"all .3s"}}>{d}</button>)}</div>{s&&<div className="ib">{s==="Tue"?<>You picked Parfit's actual example! Someone "Future Tuesday Indifferent" would accept <em>agony</em> on Tuesday to avoid a <em>headache</em> on Wednesday. <strong style={{fontStyle:"normal"}}>Can you explain why that's irrational</strong> without appealing to objective reasons?</>:<>Now imagine accepting <em>agony</em> on {s} to avoid a <em>headache</em> on any other day. Absurd — but if all preferences are valid, you can't explain why. <strong style={{fontStyle:"normal"}}>Some preferences are objectively irrational.</strong></>}</div>}</div>)}

function EgyptologistViz(){const[c,sC]=useState(null);return(<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{display:"flex",justifyContent:"center",gap:"2rem",flexWrap:"wrap",marginBottom:"1.5rem"}}><div className={"cb"+(c==="p"?" sa":"")} onClick={()=>sC("p")}><div style={{fontWeight:700,marginBottom:6,fontSize:".9rem"}}>📜 Present today</div><div style={{fontSize:".8rem",color:"var(--dim)",lineHeight:1.5}}>Act on current evidence with full confidence.</div></div><div className={"cb"+(c==="w"?" sw":"")} onClick={()=>sC("w")}><div style={{fontWeight:700,marginBottom:6,fontSize:".9rem"}}>⏳ Wait</div><div style={{fontSize:".8rem",color:"var(--dim)",lineHeight:1.5}}>Account for the evidence you know is coming.</div></div></div>{c&&<div className="ib">{c==="p"?<>You <em>know</em> your evidence is about to be overturned. Acting with confidence is willful ignorance. <strong style={{fontStyle:"normal"}}>Knowledge that better evidence is coming is itself evidence.</strong></>:<>The rational response to known future evidence is to act with appropriate uncertainty now. This applies to every decision made while <strong style={{fontStyle:"normal"}}>awaiting medical results, pending data, or upcoming information</strong>.</>}</div>}</div>)}

function TwoMinuteViz(){const[c,sC]=useState(null);return(<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{display:"flex",justifyContent:"center",gap:"2rem",flexWrap:"wrap",marginBottom:"1.5rem"}}><div className={"cb"+(c==="m"?" sa":"")} onClick={()=>sC("m")} style={{maxWidth:200}}><div style={{fontWeight:700,marginBottom:6,fontSize:".9rem"}}>😊 80 good years</div><div style={{fontSize:".8rem",color:"var(--dim)",lineHeight:1.5}}>Moderate, steady happiness.</div></div><div className={"cb"+(c==="e"?" sw":"")} onClick={()=>sC("e")} style={{maxWidth:200}}><div style={{fontWeight:700,marginBottom:6,fontSize:".9rem"}}>🤯 ~80 bad years + 2 min</div><div style={{fontSize:".8rem",color:"var(--dim)",lineHeight:1.5}}>A lifetime of suffering, then 2 minutes of ecstasy that "outweighs" it all.</div></div></div>{c&&<div className="ib">{c==="m"?<>Of course. But if self-interest = maximizing total welfare, and the 2 minutes are intense <em>enough</em>, the math says pick the suffering. <strong style={{fontStyle:"normal"}}>The absurdity is the argument.</strong> Self-interest theory fails.</>:<>This is what pure self-interest demands. <strong style={{fontStyle:"normal"}}>The fact that it feels insane is the whole point.</strong> Rationality can't just mean "pursue your own good" — because that leads here.</>}</div>}</div>)}

function DropsViz(){const[c,sC]=useState(null);return(<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{fontFamily:"var(--serif)",fontSize:".9rem",marginBottom:"1.5rem",color:"var(--dim)"}}>1,000 dying of thirst. You have one pint.</div><div style={{display:"flex",justifyContent:"center",gap:"2rem",flexWrap:"wrap",marginBottom:"1.5rem"}}><div className={"cb"+(c==="p"?" sa":"")} onClick={()=>sC("p")}><div style={{fontWeight:700,marginBottom:6,fontSize:".9rem"}}>💧 Pour it in</div><div style={{fontSize:".8rem",color:"var(--dim)",lineHeight:1.5}}>Each person gets 1/1000th of a pint. Imperceptible.</div></div><div className={"cb"+(c==="k"?" sw":"")} onClick={()=>sC("k")}><div style={{fontWeight:700,marginBottom:6,fontSize:".9rem"}}>🚫 Keep it</div><div style={{fontSize:".8rem",color:"var(--dim)",lineHeight:1.5}}>Won't perceptibly help anyone.</div></div></div>{c&&<div className="ib">{c==="p"?<>Your contribution is imperceptible. But if everyone keeps their water, <strong style={{fontStyle:"normal"}}>a thousand people die</strong>. Individual imperceptibility, taken seriously, is lethal.</>:<>If everyone makes this calculation, <strong style={{fontStyle:"normal"}}>the pool stays empty</strong>. Individual rationality → collective catastrophe.</>}</div>}</div>)}

function RepugnantViz(){const[s,sS]=useState("A"),a=s==="A";return(<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{display:"flex",justifyContent:"center",gap:"2rem",flexWrap:"wrap",marginBottom:"1.5rem"}}><div style={{padding:"1.5rem",borderRadius:8,cursor:"pointer",minWidth:170,maxWidth:210,border:a?"2px solid var(--accent)":"2px solid var(--ghost)",background:a?"var(--ghost)":"transparent",transition:"all .4s"}} onClick={()=>sS("A")}><div style={{fontSize:".7rem",letterSpacing:".15em",textTransform:"uppercase",color:"var(--dim)",marginBottom:8}}>Population A</div><div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:3,margin:"0 auto 10px",maxWidth:160}}>{Array.from({length:10}).map((_,i)=><div key={i} style={{fontSize:20}}>😊</div>)}</div><div style={{fontSize:".8rem"}}><strong>10</strong> at <strong>80%</strong></div><div style={{fontSize:".85rem",color:"var(--accent)",marginTop:8,fontWeight:700,fontFamily:"var(--serif)"}}>Total: 800</div></div><div style={{padding:"1.5rem",borderRadius:8,cursor:"pointer",minWidth:170,maxWidth:210,border:!a?"2px solid var(--warm)":"2px solid var(--ghost)",background:!a?"var(--ghost)":"transparent",transition:"all .4s"}} onClick={()=>sS("Z")}><div style={{fontSize:".7rem",letterSpacing:".15em",textTransform:"uppercase",color:"var(--dim)",marginBottom:8}}>Population Z</div><div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:1,margin:"0 auto 10px",maxWidth:190}}>{Array.from({length:70}).map((_,i)=><div key={i} style={{fontSize:9,opacity:.45}}>😐</div>)}</div><div style={{fontSize:".75rem",color:"var(--dim)",fontStyle:"italic",marginBottom:4}}>(thousands more)</div><div style={{fontSize:".8rem"}}><strong>10,000</strong> at <strong>2%</strong></div><div style={{fontSize:".85rem",color:"var(--warm)",marginTop:8,fontWeight:700,fontFamily:"var(--serif)"}}>Total: 20,000</div></div></div><div style={{maxWidth:360,margin:"0 auto 1.5rem"}}>{[["A",800,"var(--accent)","4%"],["Z",20000,"var(-- function NonIdentityViz(){const[c,sC]=useState(null);return(<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{fontFamily:"var(--serif)",fontSize:".9rem",marginBottom:"1.5rem",color:"var(--dim)"}}>Two energy policies:</div><div style={{display:"flex",justifyContent:"center",gap:"2rem",flexWrap:"wrap",marginBottom:"1.5rem"}}><div className={"cb"+(c==="s"?" sa":"")} onClick={()=>sC("s")}><div style={{fontWeight:700,marginBottom:6,fontSize:".9rem"}}>🌱 Safe</div><div style={{fontSize:".8rem",color:"var(--dim)",lineHeight:1.5}}>Lower growth. Clean future.</div></div><div className={"cb"+(c==="r"?" sw":"")} onClick={()=>sC("r")}><div style={{fontWeight:700,marginBottom:6,fontSize:".9rem"}}>🏭 Risky</div><div style={{fontSize:".8rem",color:"var(--dim)",lineHeight:1.5}}>Higher growth. Damaged future.</div></div></div>{c&&<div className="ib">{c==="s"?<>Different policy → different events → <em>different people born</em>. The future population under each policy is entirely different individuals.</>:<>Those who suffer <em>wouldn't exist</em> under the safe policy. <strong style={{fontStyle:"normal"}}>Can we "harm" people who wouldn't exist otherwise?</strong><br/><span style={{fontSize:".85rem"}}>They can't wish you'd chosen differently — they wouldn't be here.</span></>}</div>}</div>)}

><text x="40" y="232" fontSize="7.5" fill="#c0785a" fontWeight="600">Consequentialism</text><path d="M200,218Q200,130 200,30" stroke="#7a9a8a" strokeWidth="2.5" fill="none" strokeDasharray="6,4"/><text x="168" y="237" fontSize="7.5" fill="#7a9a8a" fontWeight="600">Kantianism</text><path d="M325,210Q285,140 200,30" stroke="#8a7a9a" strokeWidth="2.5" fill="none" strokeDasharray="6,4"/><text x="285" y="232" fontSize="7.5" fill="#8a7a9a" fontWeight="600">Contractualism</text><text x="88" y="180" fontSize="13">🧗</text><text x="193" y="155" fontSize="13">🧗</text><text x="290" y="180" fontSize="13">🧗</text></svg></div><div style={{display:"flex",gap:".5rem",flexWrap:"wrap",justifyContent:"center",margin:"1rem 0"}}>{tr.map(t=><div key={t.id} style={{padding:".4rem .7rem",borderRadius:6,fontSize:".7rem",border:"1.5px solid "+t.c+"30",background:t.c+"10",color:t.c,fontWeight:500,textAlign:"center",maxWidth:160}}><strong>{t.l}</strong><div style={{fontSize:".65rem",opacity:.8,marginTop:2}}>{t.s}</div></div>)}</div><div style={{fontSize:".7rem",letterSpacing:".15em",textTransform:"uppercase",color:"var(--dim)",textAlign:"center",margin:"1.5rem 0 .8rem"}}>Test the convergence:</div><div style={{display:"flex",flexDirection:"column",gap:".5rem",maxWidth:480,margin:"0 auto"}}>{cs.map(c=><button key={c.id} onClick={()=>sAc(ac===c.id?null:c.id)} style={{padding:".7rem 1rem",background:ac===c.id?"var(--ghost)":"transparent",border:ac===c.id?"1.5px solid var(--accent)":"1.5px solid var(--ghost)",borderRadius:6,cursor:"pointer",textAlign:"left",fontFamily:"var(--serif)",fontSize:".9rem",color:"var(--fg)",transition:"all .3s"}}>{c.l}</button>)}</div>{ad&&<div style={{maxWidth:480,margin:"1.5rem auto 0",animation:"fadeUp .5s ease both"}}>{tr.map(t=><div key={t.id} style={{padding:".8rem 1rem",marginBottom:".5rem",borderLeft:"3px solid "+t.c,background:t.c+"08",borderRadius:"0 6px 6px 0"}}><div style={{fontSize:".7rem",fontWeight:700,color:t.c,marginBottom:4,textTransform:"uppercase",letterSpacing:".1em"}}>{t.l}</div><div style={{fontFamily:"var(--serif)",fontSize:".85rem",lineHeight:1.6}}>{ad.a[t.id]}</div></div>)}<div style={{padding:"1rem 1.2rem",background:"rgba(192,120,90,.1)",borderRadius:8,marginTop:"1rem",border:"1px solid rgba(192,120,90,.2)"}}><div style={{fontSize:".65rem",letterSpacing:".2em",textTransform:"uppercase",color:"var(--warm)",marginBottom:6,fontWeight:700}}>The Convergence</div><div style={{fontFamily:"var(--serif)",fontSize:".9rem",lineHeight:1.65}}>{ad.cv}</div></div></div>}</div>)}

const IM={teleporter:TeleporterViz,branch:BranchViz,division:DivisionViz,spectrum:SpectrumViz,nobleman:NoblemanViz,surgery:SurgeryViz,tuesday:TuesdayViz,egyptologist:EgyptologistViz,twominute:TwoMinuteViz,torturers:TorturersViz,drops:DropsViz,prisoner:PrisonerViz,repugnant:RepugnantViz,nonidentity:NonIdentityViz,mountain:MountainViz};

function Intro({go}){return(<div style={{textAlign:"center",paddingTop:"8vh"}}><div style={{fontSize:".7rem",letterSpacing:".25em",textTransform:"uppercase",color:"var(--warm)",marginBottom:"1.5rem"}}>Reasons and Persons · On What Matters</div><h1 style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:"clamp(2rem,5vw,3rem)",lineHeight:1.15,margin:"0 0 1rem"}}>Derek Parfit</h1><p style={{fontFamily:"var(--serif)",fontStyle:"italic",fontSize:"1.1rem",color:"var(--dim)",lineHeight:1.6,maxWidth:420,margin:"0 auto 2rem"}}>Fourteen thought experiments that unravel<br/>who you are, what matters, and why.</p><p style={{fontSize:".85rem",color:"var(--dim)",lineHeight:1.7,maxWidth:420,margin:"0 auto 2.5rem"}}>Derek Parfit (1942–2017) was a British philosopher widely regarded as one of the most important moral thinkers of the 20th century. His two major works — <em>Reasons and Persons</em> (1984) and <em>On What Matters</em> (2011) — reshape how we think about identity, ethics, and what makes a life go well.</p><button onClick={go} style={{padding:".7rem 2rem",background:"none",border:"2px solid var(--accent)",color:"var(--fg)",cursor:"pointer",borderRadius:4,fontFamily:"var(--serif)",fontSize:".95rem"}}>Begin →</button></div>)}

function MountainPage(){return(<div><div className="section-label">Moral Convergence</div><h2 style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:"clamp(1.5rem,4vw,2rem)",lineHeight:1.2,margin:"0 0 .3rem"}}>Climbing the Mountain</h2><div style={{fontSize:".75rem",color:"var(--dim)",fontStyle:"italic",marginBottom:"1.5rem"}}>On What Matters, Vol. I–III</div><div style={{padding:"1.2rem 1.5rem",background:"var(--ghost)",borderLeft:"3px solid var(--warm)",borderRadius:"0 6px 6px 0",fontFamily:"var(--serif)",fontStyle:"italic",fontSize:"1.05rem",lineHeight:1.6,marginBottom:"1.5rem"}}>What if the three great moral traditions — at war for two centuries — were actually saying the same thing?</div><div style={{marginBottom:"1.5rem"}}><div style={{fontSize:".65rem",letterSpacing:".2em",textTransform:"uppercase",color:"var(--dim)",marginBottom:".5rem"}}>The Context</div><p style={{fontFamily:"var(--serif)",fontSize:".95rem",lineHeight:1.7,margin:"0 0 1rem"}}>Consequentialists: the right act produces the best outcome. Kantians: the right act follows a universalizable principle. Contractualists: the right act follows rules no one could reasonably reject. These have defined opposing camps for centuries. Parfit thought this was a catastrophic waste.</p><p style={{fontFamily:"var(--serif)",fontSize:".95rem",lineHeight:1.7,margin:0}}><em>On What Matters</em>, his 1,400-page magnum opus, argues that when each tradition is stated in its most sophisticated form, <em>they converge on the same answers</em>.</p></div><MountainViz/><div style={{marginTop:"1.5rem",marginBottom:"1.5rem"}}><div style={{fontSize:".65rem",letterSpacing:".2em",textTransform:"uppercase",color:"var(--accent)",marginBottom:".5rem"}}>The Triple Theory</div><p style={{fontFamily:"var(--serif)",fontSize:".95rem",lineHeight:1.7,margin:"0 0 1rem"}}>Parfit's <strong>Triple Theory</strong>: <em>an act is wrong iff forbidden by principles that are optimific, universally willable, and not reasonably rejectable.</em> That sentence is simultaneously consequentialist, Kantian, and contractualist.</p><p style={{fontFamily:"var(--serif)",fontSize:".95rem",lineHeight:1.7,margin:"0 0 1rem"}}>Crude consequentialism — "maximize happiness case by case" — leads to monstrous results. But <em>rule</em> consequentialism gives humane answers identical to what Kant and Scanlon arrive at. The traditions weren't wrong — they were <em>incomplete</em>.</p><p style={{fontFamily:"var(--serif)",fontSize:".95rem",lineHeight:1.7,margin:0}}>If the three really converge, moral reasoning isn't hopeless. There are right answers. The path forward isn't to pick a team — it's to realize they were always heading to the same place.</p></div><div style={{padding:"1rem 1.5rem",background:"rgba(192,120,90,.08)",borderRadius:6,marginBottom:"2rem"}}><div style={{fontSize:".65rem",letterSpacing:".2em",textTransform:"uppercase",color:"var(--warm)",marginBottom:".4rem"}}>Something to Sit With</div><p style={{fontFamily:"var(--serif)",fontStyle:"italic",fontSize:".9rem",lineHeight:1.6,margin:0}}>Two and a half millennia of ethical debate — an argument about the route while agreeing on the destination. That's either the most hopeful or the most audacious claim in modern philosophy. Probably both.</p></div></div>)}

function Conclusion(){const S=[{i:"🪞",t:"The Self Is a Story — and That's Liberating",id:"The Teleporter, Branch Line, My Division, Combined Spectrum, and Russian Nobleman all converge: there is no metaphysical \"you\" persisting unchanged. What we call identity is a bundle of psychological connections — memories, intentions, character — that hold together in degrees.",pr:"This isn't nihilism — it's freedom. You can genuinely change. The person who made bad decisions a decade ago is connected to you, but isn't identical to you. This reframes therapy, addiction recovery, personal growth, and grief. You're not losing yourself as you change — you're becoming a new configuration of the things that matter."},{i:"⏳",t:"Our Time Biases Are Distortions, Not Truths",id:"Past Surgery, Future Tuesday Indifference, the Egyptologist, and the Two-Minute Case expose deep irrationalities in how we relate to time. We discount past suffering, irrationally dread future pain, ignore incoming evidence, and let self-interest justify absurd tradeoffs.",pr:"The project you're dreading involves the same hours whether you dread it or not — anticipatory suffering is pure addition. In policy: we discount future climate damage because it feels distant, but the suffering will be just as real. In finance: we treat future savings as less real than present spending — and retire broke. Treat all moments of experience as equally real."},{i:"🌊",t:"Imperceptibility Doesn't Mean Innocence",id:"The Harmless Torturers, Drops of Water, and Prisoner's Dilemma show that moral reasoning breaks down when we focus only on individual perceptible effects. Each torturer causes no noticeable harm. Each water-holder contributes nothing detectable. Each defector makes the rational choice. The collective result is catastrophe.",pr:"Climate change is the Harmless Torturers at global scale. Your carbon footprint is imperceptible. Your vote doesn't decide elections. Your decision to skip a flu shot doesn't cause a pandemic. But if everyone reasons this way, the planet heats, democracy fails, and pandemics rage. We are responsible for contributions to collective patterns, even when individually invisible."},{i:"👶",t:"Ethics for the Unborn Is the Hardest Problem",id:"The Repugnant Conclusion and Non-Identity Problem reveal that our frameworks can't handle future people. Adding up wellbeing leads to repugnant conclusions. Person-affecting principles collapse when different choices create different people. No existing theory solves both.",pr:"Every long-term policy is a Non-Identity problem: climate, nuclear waste, genetic engineering, AI. The people affected will be different people depending on our choices. We can't \"harm\" them traditionally. Yet reckless choices feel wrong. Parfit doesn't solve this — he thought it was the most important unsolved problem in ethics — but he gives us the framework to think clearly."},{i:"⛰️",t:"We Agree More Than We Think",id:"On What Matters argues that Kantianism, consequentialism, and contractualism converge at their best. Different ethical traditions have each grasped part of the moral truth.",pr:"In a polarized world — culture wars, political tribalism, clashing ideologies — Parfit's convergence thesis is quietly radical. Many moral disagreements are about vocabulary, not values. The rights-arguer and the consequences-arguer may agree on what to do — they just can't see it through different moral languages. In disputes, ask: what would the strongest version of my opponent's framework conclude? Often: the same thing."},{i:"🔭",t:"Why This Matters Now",id:"Parfit believed we are in the most important century in human history. We have the power to shape or destroy the long-term future. His work — identity, rationality, collective action, population ethics, convergence — was foundational infrastructure for existential decisions.",pr:"AI development is a Prisoner's Dilemma between nations. Climate is a Non-Identity Problem crossed with Harmless Torturers. Bioethics questions are Repugnant Conclusion puzzles. Our ability to navigate any of them depends on achieving the kind of moral convergence Parfit spent his life arguing for. This isn't philosophy for philosophy's sake. It's the scaffolding for whether humanity has a good future — or a future at all."}];return(<div><div className="section-label">Conclusion</div><h2 style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:"clamp(1.5rem,4vw,2rem)",lineHeight:1.2,margin:"0 0 .3rem"}}>What It All Means</h2><div style={{fontSize:".75rem",color:"var(--dim)",fontStyle:"italic",marginBottom:"1.5rem"}}>Six threads — and why they matter outside the philosophy department</div><p style={{fontFamily:"var(--serif)",fontSize:".95rem",lineHeight:1.7,margin:"0 0 1.5rem"}}>Parfit's two books orbit a single question: <em>what do we have reason to do, and why?</em> The fourteen experiments above are precision instruments for dismantling assumptions about identity, time, responsibility, and morality. Here is what they build toward.</p>{S.map((s,i)=><div key={i} style={{marginBottom:"2rem",padding:"1.2rem 1.5rem",background:"var(--ghost)",borderRadius:8,borderLeft:"3px solid var(--accent)"}}><div style={{fontSize:"1.4rem",marginBottom:".3rem"}}>{s.i}</div><h3 style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:"1.05rem",margin:"0 0 .8rem"}}>{s.t}</h3><div style={{fontSize:".65rem",letterSpacing:".15em",textTransform:"uppercase",color:"var(--dim)",marginBottom:".4rem"}}>The Ideas</div><p style={{fontFamily:"var(--serif)",fontSize:".88rem",lineHeight:1.7,margin:"0 0 1rem"}}>{s.id}</p><div style={{fontSize:".65rem",letterSpacing:".15em",textTransform:"uppercase",color:"var(--warm)",marginBottom:".4rem"}}>In Practice</div><p style={{fontFamily:"var(--serif)",fontSize:".88rem",lineHeight:1.7,margin:0}}>{s.pr}</p></div>)}<div style={{margin:"2rem 0",padding:"1.5rem",textAlign:"center",borderTop:"1px solid var(--ghost)",borderBottom:"1px solid var(--ghost)"}}><p style={{fontFamily:"var(--serif)",fontStyle:"italic",fontSize:"1.1rem",lineHeight:1.7,maxWidth:440,margin:"0 auto .8rem"}}>"What matters most is not whether we survive, but whether we have reasons to act well — and whether, together, we can agree on what that means."</p><div style={{fontSize:".8rem",color:"var(--dim)"}}>— The spirit of Parfit's project</div></div><div style={{textAlign:"center",padding:"1.5rem 0",fontSize:".85rem",color:"var(--dim)",fontFamily:"var(--serif)",lineHeight:1.7}}>The books are worth the climb.<br/><em>Reasons and Persons</em> is the shorter, wilder ride.<br/><em>On What Matters</em> is the cathedral.</div></div>)}

function App(){const[ci,sCi]=useState(0),[f,sF]=useState("in"),cr=useRef(null),c=EX[ci],nav=(i)=>{if(i===ci||i<0||i>=EX.length)return;sF("out");setTimeout(()=>{sCi(i);sF("in");window.scrollTo(0,0);if(cr.current)cr.current.scrollTop=0},300)},IC=c.interactive?IM[c.interactive]:null,ii=c.id==="intro",im=c.id==="mountain",ico=c.id==="conclusion",is=!ii&&!im&&!ico;return(<div style={{fontFamily:"var(--sans)",background:"var(--bg)",color:"var(--fg)",minHeight:"100vh",display:"flex",flexDirection:"column"}}><header style={{padding:"1rem 1.5rem",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid var(--ghost)",flexShrink:0}}><div style={{fontSize:".7rem",letterSpacing:".2em",textTransform:"uppercase",color:"var(--dim)",cursor:"pointer"}} onClick={()=>nav(0)}>Parfit</div><div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end",maxWidth:"70%"}}>{EX.map((_,i)=><button key={i} className={"nav-dot"+(i===ci?" active":"")} onClick={()=>nav(i)} title={EX[i].title}/>)}</div></header><main ref={cr} className={f==="in"?"fade-in":"fade-out"} style={{flex:1,overflow:"auto",padding:"2rem 1.5rem",maxWidth:640,margin:"0 auto",width:"100%"}}>{ii&&<Intro go={()=>nav(1)}/>}{im&&<MountainPage/>}{ico&&<Conclusion/>}{is&&<div>{c.category&&<div className="section-label">{c.category}</div>}<h2 style={{fontFamily:"var(--serif)",fontWeight:700,fontSize:"clamp(1.5rem,4vw,2rem)",lineHeight:1.2,margin:"0 0 .3rem"}}>{c.title}</h2><div style={{fontSize:".75rem",color:"var(--dim)",fontStyle:"italic",marginBottom:"1.5rem"}}>{c.subtitle}</div><div style={{padding:"1.2rem 1.5rem",background:"var(--ghost)",borderLeft:"3px solid var(--warm)",borderRadius:"0 6px 6px 0",fontFamily:"var(--serif)",fontStyle:"italic",fontSize:"1.05rem",lineHeight:1.6,marginBottom:"1.5rem"}}>{c.question}</div><div style={{marginBottom:"1.5rem"}}><div style={{fontSize:".65rem",letterSpacing:".2em",textTransform:"uppercase",color:"var(--dim)",marginBottom:".5rem"}}>The Setup</div><p style={{fontFamily:"var(--serif)",fontSize:".95rem",lineHeight:1.7,margin:0}}>{c.setup}</p></div>{IC&&<div style={{margin:"2rem 0",padding:"1rem 0",borderTop:"1px solid var(--ghost)",borderBottom:"1px solid var(--ghost)"}}><IC/></div>}<div style={{marginBottom:"1.5rem"}}><div style={{fontSize:".65rem",letterSpacing:".2em",textTransform:"uppercase",color:"var(--accent)",marginBottom:".5rem"}}>Parfit's Insight</div><p style={{fontFamily:"var(--serif)",fontSize:".95rem",lineHeight:1.7,margin:0}}>{c.insight}</p></div><div style={{padding:"1rem 1.5rem",background:"rgba(192,120,90,.08)",borderRadius:6,marginBottom:"2rem"}}><div style={{fontSize:".65rem",letterSpacing:".2em",textTransform:"uppercase",color:"var(--warm)",marginBottom:".4rem"}}>Something to Sit With</div><p style={{fontFamily:"var(--serif)",fontStyle:"italic",fontSize:".9rem",lineHeight:1.6,margin:0}}>{c.provocation}</p></div></div>}{!ii&&<div style={{display:"flex",justifyContent:"space-between",paddingTop:"1rem",borderTop:"1px solid var(--ghost)"}}><button onClick={()=>nav(ci-1)} disabled={ci===0} style={{padding:".5rem 1.2rem",background:"none",border:"1.5px solid var(--ghost)",borderRadius:4,color:ci===0?"var(--ghost)":"var(--dim)",cursor:ci===0?"default":"pointer",fontFamily:"var(--serif)",fontSize:".85rem"}}>← Previous</button><button onClick={()=>nav(ci+1)} disabled={ci===EX.length-1} style={{padding:".5rem 1.2rem",background:"none",border:"1.5px solid "+(ci===EX.length-1?"var(--ghost)":"var(--accent)"),borderRadius:4,color:ci===EX.length-1?"var(--ghost)":"var(--fg)",cursor:ci===EX.length-1?"default":"pointer",fontFamily:"var(--serif)",fontSize:".85rem"}}>Next →</button></div>}</main><footer style={{padding:".8rem 1.5rem",borderTop:"1px solid var(--ghost)",fontSize:".7rem",color:"var(--dim)",textAlign:"center",flexShrink:0}}>Based on <em>Reasons and Persons</em> (1984) and <em>On What Matters</em> (2011) by Derek Parfit</footer></div>)}
